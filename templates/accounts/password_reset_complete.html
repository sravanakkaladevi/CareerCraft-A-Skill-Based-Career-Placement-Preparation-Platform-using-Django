{% extends 'base.html' %}
{% block title %}Password Updated{% endblock %}

{% block extra_css %}
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#0d1b2e;}
.panel{width:min(92vw,500px);padding:36px 34px;border:1.5px solid rgba(24,95,165,0.55);border-radius:10px;background:rgba(9,20,36,0.92);box-shadow:0 0 40px rgba(24,95,165,0.22);text-align:center;}
.brand{font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#378ADD;margin-bottom:14px;}
h1{font-size:28px;font-weight:600;color:#fff;margin-bottom:10px;}
p{font-size:13px;color:rgba(255,255,255,0.58);line-height:1.8;}
a{display:inline-block;margin-top:18px;color:#7fb7ef;text-decoration:none;font-size:12px;}
</style>
{% endblock %}

{% block content %}
<div class="panel">
    <div class="brand">CareerCraft</div>
    <h1>Password updated</h1>
    <p>Your password has been changed successfully. You can sign in now with the new password.</p>
    <a href="{% url 'login' %}">Go to login</a>
</div>
{% endblock %}
